; PlatformIO Project Configuration File for ESPixelStick
; https://docs.platformio.org/page/projectconf.html
;
; Local configuration should be done in platformio_user.ini

[platformio]
default_envs = esp32_idftest, esp8266_espsv3, esp8266_wemos_d1_mini, esp8266_wemos_d1_mini_pro, esp8266_esp01s, esp32_lolin_d1_pro, esp32_lolin_d1_pro_eth, esp32_cam, esp32_ttgo_t8, esp32_bong69, esp32_wt32eth01, esp32_quinled_quad, esp32_quinled_quad_p5, esp32_quinled_quad_ae_plus, esp32_quinled_quad_ae_plus_8, esp32_quinled_quad_eth, esp32_quinled_quad_eth_p5, esp32_quinled_uno, esp32_quinled_uno_ae_plus, esp32_quinled_uno_eth, esp32_quinled_dig_octa, esp32_d1_mini_mhetesp32minikit, esp32_olimex_gw, esp32_d1_mini_twilightlord, esp32_d1_mini_twilightlord_eth, esp32_devkitc, esp32_devkitc6, esp32_quinled_uno_eth_espsv3, esp32_quinled_uno_espsv3, esp32_m5stack_atom, esp32_deuxquatro_dmx, esp32_wasatch, esp32_tetra2go, esp32_octa2go, esp32_solo2go, esp32_kr_lights_msm, esp32_ka, esp32_ka_4, esp32_breakdancev2, esp32_foo, esp32s3_seeed_xiao, esp32_wemos_d1_mini32, esp32_wemos_d1_mini32_eth, esp32s3_devkitc, esp32s3_devkitc_Internal_SD, esp32_devkitv_eth, esp32s3_fh4r2

src_dir = ./src
data_dir = ./data
build_cache_dir = ./.pio/.buildcache
packages_dir = ./.pio/packages
cache_dir = ./.pio/cache
extra_configs = platformio_user.ini

;~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~;
; build environment defined in platformio_user.ini to predefine WiFi secrets ;
;~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~;
[secrets]
build_flags =

;~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~;
; Baseline build environment                                         ;
; https://docs.platformio.org/en/latest/projectconf/section_env.html ;
;~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~;
[env]
monitor_speed = 115200
upload_speed = 921600
lib_compat_mode = strict
board_build.filesystem = littlefs
; build_type = debug
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.0
    bblanchon/ArduinoJson @ ^7.3.0
    djgrrr/Int64String @ ^1.1.1
    https://github.com/forkineye/ESPAsyncE131 ; supports setting buffer limits
    https://github.com/greiman/SdFat @ ^2.3.0
    https://github.com/MartinMueller2003/ESPAsyncTCP ; Added limit to num TCP sessions
    https://github.com/MartinMueller2003/ESPAsyncWebServer
    https://github.com/marvinroger/async-mqtt-client @ ^0.9.0
    https://github.com/paulstoffregen/Time @ ^1.6.1
    https://github.com/MartinMueller2003/Artnet
    https://github.com/MartinMueller2003/Espalexa
    https://github.com/MartinMueller2003/SimpleFTPServer
extra_scripts =
    .scripts/download_fs.py
    pre:.scripts/pio-version.py
    post:.scripts/CopyTargets.py
build_flags =
    ${secrets.build_flags}
    -D ENABLE_DEDICATED_SPI=1 ; instruct SdFat to take ownership of the spi device
    -D SDFAT_FILE_TYPE=3 ; SdFat full support
    -D USE_LONG_FILE_NAMES=1 ; SdFat
    -D MAINTAIN_FREE_CLUSTER_COUNT=1 ; SdFat
    -D CHECK_FLASH_PROGRAMMING=0 ; SdFat
    -D INCLUDE_SDIOS=1 ; SdFat
;    -D USE_DBG_MACROS=2 ; SdFat
    -D SUPPORT_FTP
;    -D FTP_SERVER_DEBUG
;    -D FTP_ADDITIONAL_DEBUG
;    -D DEBUG_FSEQ
;    -D USE_SERIAL_DEBUG_COUNTERS=1
;    -D USE_UART_DEBUG_COUNTERS=1
;    -D USE_PIXEL_DEBUG_COUNTERS=1
;    -D DEBUG_FILE_HANDLES=1
;    -D DEBUG_ESP_PORT=Serial
;    -D DEBUG_ESP_OOM
;    -D DEBUG_ESP_ASYNC_TCP=1
    -D DISABLE_FS_H_WARNING=1
    -I ./ESPixelStick/src
    -I ./include
    -I ./include/network
;    -fexceptions ; enable for espidf builds
    -mtext-section-literals
    -Wl,-Map=firmware.map
    -Wl,--cref
;    -fstack-protector-all
lib_ignore =
	ESP Async WebServer
	; AsyncTCP

;~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~;
; ESP8266 defaults for 4MB flash                                     ;
; https://docs.platformio.org/en/latest/platforms/espressif8266.html ;
;~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~;
[esp8266]
framework = arduino
platform = espressif8266 @ ^4.2.1 ; Arduino Core v3.0.2
board_build.f_cpu = 160000000L
board_build.ldscript = eagle.flash.4m2m.ld
; build_type = debug
; monitor_filters = esp8266_exception_decoder ; requires build_type = debug
build_flags =
    ${env.build_flags}
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH_LOW_FLASH
    -D NDEBUG        ; https://github.com/esp8266/Arduino/issues/3978
    -D FP_IN_IROM    ; https://github.com/esp8266/Arduino/pull/7180
    -D PIO_FRAMEWORK_ARDUINO_MMU_CACHE16_IRAM48
;    -D CONFIG_LWIP_MAX_SOCKETS=1 ; does not seem to have any impact
;    -D LWIP_MAX_SOCKETS=1        ; does not seem to have any impact
;    -D VTABLES_IN_IRAM
    -D VTABLES_IN_FLASH
    -D DEFAULT_FTP_SERVER_NETWORK_TYPE_ESP8266=2
    -D DEFAULT_STORAGE_TYPE_ESP8266=2
lib_ignore =
    Ethernet ; Remove once Art-Net is fixed / replaced to not depend on Ethernet in lib config
    ; ESPAsyncTCP
lib_deps =
    ${env.lib_deps}
    me-no-dev/ESPAsyncUDP
extra_scripts =
    ${env.extra_scripts}
    pre:.scripts/deleteSD.py

;~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~;
; ESP32 defaults for 4MB flash                                     ;
; https://docs.platformio.org/en/latest/platforms/espressif32.html ;
;~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~;
[esp32]
extends=env
framework = arduino
platform = espressif32 @ ^6.12.0
board_build.partitions = ESP32_partitions.csv
; monitor_filters = esp32_exception_decoder
; monitor_filters = esp32_exception_decoder, time
build_flags =
    ${env.build_flags}
    -D ARDUINO_LOOP_STACK_SIZE=12288
    -D DEFAULT_FTP_SERVER_NETWORK_TYPE_ESP32=6
    -D DEFAULT_STORAGE_TYPE_ESP32=2
    -D SUPPORT_UNZIP=1
;    -D MAKECRCH=1 ; force the unzip to make the CRC table dynamically
;    -D DYNAMIC_CRC_TABLE=1 ; unzip uses this
    -D NOBYFOUR=1 ; reduced unzip table size
    -D CONFIG_DISABLE_HAL_LOCKS=1
    -D CONFIG_RMT_ISR_IRAM_SAFE=yes
;    -D USE_RMT_DEBUG_COUNTERS=1
;    -D DEBUG_RMT_XLAT_ISSUES=1

build_unflags =
    ${env.build_unflags}
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -mfix-esp32-psram-cache-strategy=memw
    -fno-exceptions

lib_deps =
    ${env.lib_deps}
    mathieucarbou/OneWire @ ^2.3.9
    https://github.com/MartinMueller2003/DS18B20
    https://github.com/bitbank2/unzipLIB

lib_ignore =
    ${env.lib_ignore}
;    esp_littleFS

extra_scripts = ${env.extra_scripts}
    .scripts/replace_fs.py

[esp32idf]
extends=env
platform = https://github.com/Jason2866/platform-espressif32.git#Arduino/IDF53
; framework = arduino
framework = arduino, espidf
board_build.partitions = ESP32_partitions.csv
; monitor_filters = esp32_exception_decoder
; monitor_filters = esp32_exception_decoder, time
build_flags =
    ${env.build_flags}
    -D ARDUINO_LOOP_STACK_SIZE=12288
    -D DEFAULT_FTP_SERVER_NETWORK_TYPE_ESP32=6
    -D DEFAULT_STORAGE_TYPE_ESP32=2
    -D SUPPORT_UNZIP=1
;    -D MAKECRCH=1 ; force the unzip to make the CRC table dynamically
;    -D DYNAMIC_CRC_TABLE=1 ; unzip uses this
    -D NOBYFOUR=1 ; reduced unzip table size
    -D CONFIG_DISABLE_HAL_LOCKS=1
    -D CONFIG_RMT_ISR_IRAM_SAFE=yes
;    -D USE_RMT_DEBUG_COUNTERS=1
;    -D DEBUG_RMT_XLAT_ISSUES=1

build_unflags =
    ${env.build_unflags}
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -mfix-esp32-psram-cache-strategy=memw
    -fno-exceptions

lib_deps =
    ${env.lib_deps}
    mathieucarbou/OneWire @ ^2.3.9
    https://github.com/MartinMueller2003/DS18B20
    https://github.com/bitbank2/unzipLIB

lib_ignore =
    ${env.lib_ignore}
;    esp_littleFS

extra_scripts = ${env.extra_scripts}
    .scripts/replace_fs.py

