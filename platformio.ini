extends = esp32
board = esp32-s3-devkitc-1-custom
board_build.partitions = ESP32S3_InternalSD_partitions.csv
build_flags =
    ${esp32.build_flags}
    -D BOARD_NAME='"esp32S3 DEVKITC Internal SD"'
    -D BOARD_ESP32S3_DEVKITC
    -D SIMULATE_SD
build_unflags =
    ${esp32.build_unflags}

[env:esp32_devkitv_eth]
extends = esp32
board = esp32dev
build_flags =
    ${esp32.build_flags}
    -D BOARD_NAME='"esp32_devkitv_eth"'
    -D BOARD_ESP32_DEVKITV_ETH
build_unflags =
    ${esp32.build_unflags}
    -D BOARD_HAS_PSRAM

[env:esp32s3_fh4r2]
extends = esp32
board = adafruit_qtpy_esp32s3_n4r2
board_build.f_cpu = 160000000L
board_build.arduino.memory_type = qio_qspi
build_flags =
    ${esp32.build_flags}
    -D BOARD_ESP32S3_FH4R2
    -D BOARD_NAME='"adafruit_qtpy_esp32s3_n4r2"'
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_RUNNING_CORE=1
    -D ARDUINO_EVENT_RUNNING_CORE=1
build_unflags =
    ${esp32.build_unflags}
[env:esp32_idftest]
extends = esp32idf
board = wemos_d1_mini32
build_flags =
    ${esp32.build_flags}
    -D BOARD_NAME='"esp32 quinled quad ae plus"'
    -D BOARD_ESP32_QUINLED_QUAD_AE_PLUS
build_unflags =
    ${esp32.build_unflags}
