<fieldset>
    <div class="form-group">
        <label class="control-label col-sm-2" for="pixel_count">Pixel Count</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid PixelCount" id="pixel_count" step="1" min="1" max="3000" value="0" required title="Number of pixels" onchange="PixelCountOnChange(this)">
        </div>
        <label class="control-label col-sm-2" for="group_size">Group Size</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid PixelCount" id="group_size" step="1" min="1" max="3000" value="-1" required title="Group every X number of physical pixels together.  Default of 1 is no grouping." onchange="GroupsOnChange(this)">
        </div>
        <label class="control-label col-sm-2 hidden" id="groupslabel" for="groups">Number of Groups</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid PixelCount hidden" id="groups" step="1" min="1" max="3000" value="-1" required title="Number of groups" onchange="GroupsOnChange(this)">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-sm-2" for="color_order">Color Order</label>
        <div class="col-sm-2">
            <select class="form-control" id="color_order">
                <option value="rgb">RGB</option>
                <option value="rbg">RBG</option>
                <option value="gbr">GBR</option>
                <option value="grb">GRB</option>
                <option value="brg">BRG</option>
                <option value="bgr">BGR</option>
                <option value="wrgb">WRGB</option>
                <option value="wrbg">WRBG</option>
                <option value="wgbr">WGBR</option>
                <option value="wgrb">WGRB</option>
                <option value="wbrg">WBRG</option>
                <option value="wbgr">WBGR</option>
                <option value="rgbw">RGBW</option>
                <option value="rbgw">RBGW</option>
                <option value="gbrw">GBRW</option>
                <option value="grbw">GRBW</option>
                <option value="brgw">BRGW</option>
                <option value="bgrw">BGRW</option>
            </select>
        </div>
        <label class="control-label col-sm-2" for="zig_size">Zigzag Count</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid" id="zig_size" step="1" min="0" max="680" value="-1" required title="Zigzag every X number of physical pixels." onchange="PixelCountOnChange()">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-sm-2" for="gamma">Gamma Value</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid" id="gamma" step="0.1" min="1.0" max="5.0" value="-1.0" required title="Recommended value is 2.2. Set to 1.0 to disable." onchange="PixelCountOnChange()">
        </div>

        <label class="control-label col-sm-2" for="brightness">Brightness (%)</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid" id="brightness" step="1" min="1" max="100" value="-100" title="Set brightness as a percentage" onchange="PixelCountOnChange()">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-sm-2" for="prependnullcount">Start NULL Count</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid" id="prependnullcount" step="1" min="0" max="100" value="-1" title="Number of NULL Pixels to send before Pixel Data" onchange="PixelCountOnChange()">
        </div>
        <label class="control-label col-sm-2" for="appendnullcount">End NULL Count</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid" id="appendnullcount" step="1" min="0" max="100" value="-1" title="Number of NULL Pixels to send after Pixel Data" onchange="PixelCountOnChange()">
        </div>
    </div>

    <div class="form-group">
        <div class="col-sm-offset-2 col-sm-2">
            <div class="checkbox"><label><input type="checkbox" id="showgamma"> Show Gamma Curve</label></div>
        </div>
        <label class="control-label col-sm-2" for="interframetime">Inter Frame Time (us)</label>
        <div class="col-sm-2">
            <input type="number" class="form-control is-valid" id="interframetime" step="1" min="1" max="10000" value="-300" required title="Number of Micro Seconds between each frame." onchange="PixelCountOnChange()">
        </div>
        <label class="control-label col-sm-2 hidden" for="refreshRate">Refresh Rate</label>
        <div class="col-sm-2">
            <output type="number" class="form-control is-valid hidden" id="refreshRate" required title="Number of Frames per second.">
        </div>
    </div>

    <div class="form-group hidden AdvancedMode esp32">
        <label class="control-label col-sm-2 esp32" for="data_pin">GPIO Output</label>
        <div class="col-sm-2 esp32">
            <input type="number" class="form-control is-valid esp32" id="data_pin" step="1" min="0" max="64" value="-65" required title="GPIO on which to output data">
        </div>
    </div>

    <div class="col-sm-offset-2 col-sm-8 hidden gammagraph">
        <svg viewBox="-25 -30 320 320" width="256" height="256" class="chart">
            <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#f00" />
                </marker>
            </defs>

            <line x1="0" y1="256" x2="256" y2="256" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
            <text x="125" y="275" class="label-title">Input</text>

            <line x1="0" y1="256" x2="0" y2="0" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
            <text x="-15" y="120" class="label-title" style="writing-mode: tb;">Output</text>

            <polyline id="cracker"
            fill="none"
            stroke="#0074d9"
            stroke-width="2"
            points="" />
        </svg>
    </div>
</fieldset>

<script>

    function SetFps(path)
    {
        // var NumberOfPixels       = parseInt($('#pixel_count').val (), 10);
        // var BytesPerPixel = $('#color_order option:selected').val().length;
        // console.info("BytesPerPixel: " + BytesPerPixel);
        // var NumberOfBytesInFrame = NumberOfPixels * BytesPerPixel;
        // var PixelBaudRate        = 800000;
        // var TimePerBit           = 1 / PixelBaudRate;
        // var BitsPerByte          = 8;
        // var TimePerByte          = TimePerBit * BitsPerByte; = 0.00001
        // var InterFrameGap        = parseInt($('#interframetime').val (), 10) / 1000000;
        // var TimePerFrame         = (TimePerByte * NumberOfBytesInFrame) + InterFrameGap;
        var TimePerFrame = (0.00001 * (parseInt($(path + ' #pixel_count').val (), 10) * $(path + ' #color_order option:selected').val().length)) + (parseInt($(path + ' #interframetime').val (), 10) / 1000000);
        var rateMs = TimePerFrame * 1000;
        var hz = 1 / TimePerFrame;
        $(path + ' #refreshRate').html(Math.ceil(rateMs) + ' ms / ' + Math.floor(hz) + ' fps');
    }

    function PixelCountOnChange(Element)
    {
        let ElementPath = $(Element).attr("path");
        console.debug("PixelCountOnChange ElementPath: " + ElementPath);

        if(undefined !== ElementPath)
        {
            if($(ElementPath + ' #pixel_count').hasClass('updating'))
            {
            }
            else
            {
                $(ElementPath + ' #pixel_count').addClass('updating');
                let NumPixels = parseInt($(ElementPath + ' #pixel_count').val (), 10);
                let GroupSize = parseInt($(ElementPath + ' #group_size').val (), 10);
                let NumGroups = parseInt($(ElementPath + ' #groups').val (), 10);

                // console.debug("NumPixels: " + NumPixels);
                // console.debug("NumGroups: " + NumGroups);
                // console.debug("GroupSize: " + GroupSize);

                NumGroups = Math.trunc(NumPixels / GroupSize);
                $(ElementPath + ' #groups').val (NumGroups);

                if(1 === GroupSize)
                {
                    $(ElementPath + ' #groups').addClass('hidden');
                    $(ElementPath + ' #groupslabel').addClass('hidden');
                }
                else
                {
                    $(ElementPath + ' #groups').removeClass('hidden');
                    $(ElementPath + ' #groupslabel').removeClass('hidden');
                }
                SetFps(ElementPath);
                $(ElementPath + ' #pixel_count').removeClass('updating');
            }
        }
    } // PixelCountOnChange

    function GroupsOnChange(Element)
    {
        let ElementPath = $(Element).attr("path");
        console.debug("GroupsOnChange ElementPath: " + ElementPath);

        if(undefined !== ElementPath)
        {
            if($(ElementPath + ' #pixel_count').hasClass('updating'))
            {
            }
            else
            {
                $(ElementPath + ' #pixel_count').addClass('updating');

                // let NumPixels = parseInt($(ElementPath + ' #pixel_count').val (), 10);
                let GroupSize = parseInt($(ElementPath + ' #group_size').val (), 10);
                let NumGroups = parseInt($(ElementPath + ' #groups').val (), 10);

                // console.debug("NumPixels: " + NumPixels);
                // console.debug("NumGroups: " + NumGroups);
                // console.debug("GroupSize: " + GroupSize);

                $(ElementPath + ' #pixel_count').val (Math.trunc(GroupSize * NumGroups));

                if(1 === GroupSize)
                {
                    $(ElementPath + ' #groups').addClass('hidden');
                    $(ElementPath + ' #groupslabel').addClass('hidden');
                }
                else
                {
                    $(ElementPath + ' #groups').removeClass('hidden');
                    $(ElementPath + ' #groupslabel').removeClass('hidden');
                }

                SetFps(ElementPath);
                $(ElementPath + ' #pixel_count').removeClass('updating');
            }
        }
    } // GroupsOnChange

    // Gamma graph
    $('#ws2811 #PixelCommon #showgamma').click(function () {
        if ($(this).is(':checked')) {
            $('.gammagraph').removeClass('hidden');
        } else {
            $('.gammagraph').addClass('hidden');
        }
    });

    // Gamma graph
    $('#ws2811 #PixelCommon #gamma').change(function () {
        sendGamma();
    });

    $('#ws2811 #PixelCommon #brightness').change(function () {
        sendGamma();
    });

    function sendGamma() {
        var json = {
            'pixel': {
                'gammaVal': parseFloat($('#p_gammaVal').val()),
                'briteVal': parseFloat($('#p_briteVal').val())
            }
        }
        //    wsEnqueue('S4' + JSON.stringify(json));
        //    wsEnqueue('G4'); // Get Gamma Table
    }

    function refreshGamma(data) {
        var gammaData = JSON.parse(data);
        var polyline = document.getElementById('cracker');
        var points = polyline.getAttribute('points');

        points = "";
        for (X = 0; X < 256; X++) {
            var Y = 255 - gammaData.gamma[X];
            points += X + ", " + Y + " ";
        }

        polyline.setAttribute('points', points);
    }

</script>
